<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القهوة - غرفة الصوت 🎙️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
    <link rel="shortcut icon" href="images/coffee.ico" type="image/x-icon">
    <style>
        /* Base Full-Screen Setup */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Tajawal', sans-serif; background: #0f0f11; }
        
        .glass-nav { z-index: 1000; position: fixed; width: 100%; top: 0; left: 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* Setup / Lobby / Request Areas */
        .lobby-wrapper { display: flex; justify-content: center; align-items: center; height: 100%; padding-top: 60px; background: radial-gradient(circle at center, var(--bg-card) 0%, var(--bg-light) 100%); }
        .lobby-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 24px; padding: 40px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); position: relative; }
        
        .top-action-btn { position: absolute; top: 15px; left: 15px; background: var(--bg-light); border: 1px solid var(--border-color); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; color: var(--text-dark); transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .top-action-btn:hover { background: var(--primary-blue); color: white; transform: rotate(45deg); }

        .mic-preview { width: 120px; height: 120px; border-radius: 50%; background: var(--bg-light); border: 4px solid var(--border-color); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 3rem; transition: all 0.3s; }
        .mic-preview.active { border-color: #2ecc71; color: #2ecc71; box-shadow: 0 0 30px rgba(46, 204, 113, 0.3); }
        .mic-preview.muted { border-color: #e74c3c; color: #e74c3c; }

        .spinner { width: 50px; height: 50px; border: 4px solid var(--border-color); border-top-color: var(--primary-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Main Room Layout */
        .room-layout { display: flex; height: 100%; width: 100%; padding-top: 60px; overflow: hidden; background: #0f0f11; transition: background 0.3s; }
        [data-theme="light"] .room-layout { background: #f0f2f5; }

        .main-stage { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; overflow: hidden; }

        .stage-header { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 10; flex-wrap: wrap; gap: 10px; }
        
        .room-badge { background: rgba(0, 0, 0, 0.6); color: white; backdrop-filter: blur(10px); padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; }
        .room-badge:hover { background: rgba(0,0,0,0.8); transform: scale(1.05); }
        [data-theme="light"] .room-badge { background: rgba(255, 255, 255, 0.9); color: var(--text-dark); border: 1px solid rgba(0,0,0,0.1); }
        
        select.room-badge { outline: none; appearance: none; padding-right: 15px; padding-left: 30px; font-family: 'Tajawal', sans-serif; cursor: pointer; }
        select.room-badge option { color: black; background: white; }

        .request-badge { background: #e74c3c; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; margin-right: 5px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .participants-grid { flex: 1; display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 15px; padding: 70px 20px 100px 20px; overflow-y: auto; }

        /* Cards */
        .participant-card { background: #202124; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: all 0.3s ease; flex: 1 1 220px; max-width: 300px; aspect-ratio: 4 / 3; box-shadow: 0 8px 20px rgba(0,0,0,0.2); border: 3px solid transparent; overflow: hidden; }
        [data-theme="light"] .participant-card { background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .participant-card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; z-index: 2; transition: transform 0.2s; }
        .participant-name { font-weight: bold; color: white; z-index: 2; font-size: 0.9rem; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 12px; }
        [data-theme="light"] .participant-name { color: var(--text-dark); background: rgba(0,0,0,0.05); }
        
        .participant-card.speaking { border-color: #8ab4f8; }
        .participant-card.speaking img { transform: scale(1.1); box-shadow: 0 0 0 5px rgba(138, 180, 248, 0.3); }

        .mic-status-icon { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; z-index: 3; }
        .mic-status-icon.muted { background: #ea4335; }
        .mic-status-icon.active { display: none; }

        /* Dock / Controls Bar */
        .dock-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(32, 33, 36, 0.9); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 30px; display: flex; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); z-index: 20; transition: 0.4s; }
        [data-theme="light"] .dock-bar { background: rgba(255, 255, 255, 0.95); box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-color: rgba(0,0,0,0.05); }

        .dock-btn { width: 48px; height: 48px; border-radius: 50%; border: none; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: white; background: #3c4043; }
        [data-theme="light"] .dock-btn { color: #3c4043; background: #f1f3f4; }
        .dock-btn:hover { background: #4d5156; }
        [data-theme="light"] .dock-btn:hover { background: #e8eaed; }
        
        .dock-btn.muted, .dock-btn.leave { background: #ea4335 !important; color: white !important; }
        .dock-btn.leave { width: 65px; border-radius: 24px; }
        .dock-btn.active-chat { background: #8ab4f8 !important; color: #202124 !important; }

        /* Chat Sidebar */
        .chat-sidebar { width: 350px; background: var(--bg-card); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -5px 0 20px rgba(0,0,0,0.1); z-index: 15; height: 100%; position: relative; }
        .chat-sidebar.hidden { transform: translateX(100%); position: absolute; right: 0; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: var(--bg-light); }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .chat-input-box { padding: 15px; border-top: 1px solid var(--border-color); display: flex; gap: 10px; background: var(--bg-card); }
        .chat-input-box input { flex: 1; padding: 12px 15px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-light); color: var(--text-dark); outline: none; }
        .chat-input-box button { background: var(--primary-blue); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; transition: 0.2s; }
        
        .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 0.9rem; max-width: 80%; line-height: 1.4; word-wrap: break-word; animation: slideUp 0.2s; }
        .msg-bubble.mine { background: var(--primary-blue); color: white; align-self: flex-start; border-top-right-radius: 4px; }
        .msg-bubble.others { background: var(--bg-light); color: var(--text-dark); border: 1px solid var(--border-color); align-self: flex-end; border-top-left-radius: 4px; }
        .msg-author { font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; display: block; opacity: 0.8; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Advanced Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 2000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-box { background: var(--bg-card); padding: 0; border-radius: 20px; width: 90%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); transform: scale(0.95); transition: 0.3s; overflow: hidden; border: 1px solid var(--border-color); display: flex; flex-direction: column; max-height: 80vh; }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: var(--bg-light); }
        .modal-body { padding: 20px; overflow-y: auto; }
        
        .modal-tabs { display: flex; border-bottom: 1px solid var(--border-color); background: var(--bg-light); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; color: var(--text-grey); font-weight: bold; transition: 0.2s; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--primary-blue); border-bottom-color: var(--primary-blue); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s; }

        .btn-action { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .btn-cancel { background: var(--bg-light); color: var(--text-dark); border: 1px solid var(--border-color); }
        .btn-danger { background: #ea4335; color: white; }
        .btn-warning { background: #f39c12; color: white; }

        .user-list-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border-color); }
        .user-list-info { display: flex; align-items: center; gap: 10px; }
        .user-list-info img { width: 40px; height: 40px; border-radius: 50%; }
        .user-list-actions { display: flex; gap: 5px; }
        .action-btn { background: var(--bg-light); border: 1px solid var(--border-color); border-radius: 50%; width: 35px; height: 35px; cursor: pointer; color: var(--text-dark); transition: 0.2s; }
        .action-btn:hover.kick { background: #ea4335; color: white; border-color: #ea4335; }
        .action-btn:hover.mute { background: #fbbc04; color: black; border-color: #fbbc04; }
        .action-btn:hover.unmute { background: #2ecc71; color: white; border-color: #2ecc71; }
        .action-btn:hover.accept { background: #2ecc71; color: white; border-color: #2ecc71; }

        #toast-container { position: fixed; top: 80px; left: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: var(--bg-card); color: var(--text-dark); border-left: 4px solid var(--primary-blue); padding: 12px 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-size: 0.9rem; display: flex; align-items: center; gap: 10px; pointer-events: all; }

        @media (max-width: 768px) {
            .participants-grid { padding: 10px 10px 90px 10px; gap: 10px; }
            .participant-card { flex: 1 1 140px; aspect-ratio: 1/1.2; }
            .chat-sidebar { position: fixed; top: 0; right: 0; width: 100%; z-index: 1500; }
            .dock-bar { width: 90%; justify-content: space-around; padding: 10px; border-radius: 20px; }
            body.chat-open .glass-nav { display: none; }
            body.chat-open .dock-bar { display: none; }
        }
    </style>
</head>
<body>

    <nav class="navbar glass-nav">
        <a href="dashboard.html" class="logo" style="text-decoration: none;">
            <div class="logo1"><img src="images/logo1.png" class="logoimg" alt="Logo"></div>القهوة
        </a>
    </nav>

    <div id="toast-container"></div>

    <div id="setupArea" class="lobby-wrapper">
        <div class="lobby-card">
            <button class="top-action-btn" id="openLobbySettingsBtn" title="الإعدادات"><i class="fa-solid fa-gear"></i></button>
            <h2 id="setupTitle" style="color: var(--primary-blue); margin-bottom: 5px;">تجهيز الغرفة</h2>
            <p style="color: var(--text-grey); margin-bottom: 25px;" id="setupDesc">جاري التحقق من الصوت...</p>
            
            <div id="micPreview" class="mic-preview"><i class="fa-solid fa-microphone"></i></div>
            
            <button id="preJoinMicBtn" class="btn-outline" style="border-radius: 25px; margin-bottom: 10px;">
                <i class="fa-solid fa-microphone-slash"></i> كتم المايك
            </button>
            <p id="micStatusText" style="font-size: 0.85rem; color: var(--text-grey); margin-bottom: 25px;"></p>

            <div id="createControls" style="display: none; flex-direction: column; gap: 15px;">
                <input type="text" id="roomNameInput" class="form-input" placeholder="اسم الغرفة (مثال: قعدة صحاب)" autocomplete="off">
                <select id="roomPrivacy" class="form-input">
                    <option value="public">🌍 عامة (متاحة للجميع)</option>
                    <option value="private">🔒 خاصة (بموافقة المعلم)</option>
                </select>
                <button id="createRoomBtn" class="btn-primary" style="padding: 12px; border-radius: 25px;"><i class="fa-solid fa-plus"></i> افتح الغرفة</button>
            </div>

            <div id="joinControls" style="display: none;">
                <button id="joinRoomBtn" class="btn-primary" style="width: 100%; padding: 12px; border-radius: 25px;"><i class="fa-solid fa-right-to-bracket"></i> انضم دلوقتي</button>
            </div>
        </div>
    </div>

    <div id="requestArea" class="lobby-wrapper" style="display: none;">
        <div class="lobby-card">
            <div class="spinner"></div>
            <h3 style="color: var(--primary-blue); margin-bottom: 10px;">في انتظار موافقة المعلم...</h3>
            <p style="color: var(--text-grey); font-size: 0.9rem; margin-bottom: 20px;">الغرفة دي خاصة أو تم طردك قبل كده، طلبك وصل للمعلم وفي انتظار قبوله.</p>
            <button class="btn-outline" onclick="window.location.href='dashboard.html'" style="border-radius: 20px;">رجوع للصالة</button>
        </div>
    </div>

    <div id="activeRoomArea" class="room-layout" style="display: none;">
        <div class="main-stage">
            <div class="stage-header">
                <div style="display: flex; gap: 10px;">
                    <div class="room-badge" id="roomNameBadge"><i class="fa-solid fa-house"></i> <span id="rNameText"></span></div>
                    
                    <div class="room-badge" id="roomPrivacyBadge" style="display: none;"></div>
                    
                    <select class="room-badge" id="adminPrivacySelect" style="display: none;" title="تغيير الخصوصية">
                        <option value="public">🌍 عامة</option>
                        <option value="private">🔒 خاصة</option>
                    </select>
                </div>

                <div class="room-badge" id="openParticipantsBtn" title="قائمة الحاضرين">
                    <i class="fa-solid fa-users"></i> <span id="participantsCount">1</span>
                    <div id="requestAlertBadge" class="request-badge" style="display:none;">!</div>
                </div>
            </div>

            <div class="participants-grid" id="participantsGrid"></div>

            <div class="dock-bar" id="bottomDock">
                <button class="dock-btn" id="toggleMicBtn" title="المايك"><i class="fa-solid fa-microphone"></i></button>
                <button class="dock-btn" id="toggleChatBtn" title="الشات"><i class="fa-regular fa-comment-dots"></i></button>
                <button class="dock-btn" id="inviteBtn" title="نسخ الرابط"><i class="fa-solid fa-user-plus"></i></button>
                <button class="dock-btn" id="openRoomSettingsBtn" title="الإعدادات"><i class="fa-solid fa-gear"></i></button>
                <button class="dock-btn leave" id="leaveBtn" title="مغادرة"><i class="fa-solid fa-phone-slash"></i></button>
            </div>
        </div>

        <div class="chat-sidebar hidden" id="chatSidebar">
            <div class="chat-header">
                <h3 style="margin: 0; color: var(--primary-blue);"><i class="fa-regular fa-comments"></i> اللمة</h3>
                <button class="btn-outline" id="closeChatBtn" style="border: none; padding: 5px 10px; border-radius: 10px;"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="chat-area" id="roomChatArea">
                <div style="text-align: center; color: var(--text-grey); font-size: 0.8rem; margin: 10px 0;">الشات مؤقت.</div>
            </div>
            <div class="chat-input-box">
                <input type="text" id="roomChatInput" placeholder="اكتب رسالة..." autocomplete="off">
                <button id="sendRoomChatBtn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="participantsModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 style="margin: 0; color: var(--primary-blue);">الناس اللي في القعدة</h3>
                <button class="close-modal-btn" data-target="participantsModal" style="background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--text-dark);"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-tabs">
                <button class="tab-btn active" data-tab="usersTab">المتواجدون</button>
                <button class="tab-btn" data-tab="requestsTab" id="requestsTabBtn" style="display:none;">الطلبات <span id="reqCountBadge" style="color:#e74c3c;"></span></button>
            </div>
            <div class="modal-body">
                <div id="usersTab" class="tab-content active" style="display: flex; flex-direction: column; gap: 5px;"></div>
                <div id="requestsTab" class="tab-content" style="display: flex; flex-direction: column; gap: 5px;"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 style="margin: 0; color: var(--primary-blue);">الإعدادات</h3>
                <button class="close-modal-btn" data-target="settingsModal" style="background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--text-dark);"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <p style="color: var(--text-grey); font-size: 0.9rem; margin-bottom: 15px;">اختار المايك اللي حابب تستخدمه:</p>
                <select id="micSelect" class="form-input" style="width: 100%; border-radius: 12px; margin-bottom: 10px;"><option value="">جاري البحث...</option></select>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="leaveModal">
        <div class="modal-box" style="text-align: center; padding-bottom: 20px;">
            <div style="background: #fce8e6; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 20px auto 10px;"><i class="fa-solid fa-right-from-bracket fa-2x" style="color: #ea4335;"></i></div>
            <h3 id="leaveModalTitle" style="margin-bottom: 10px;">خيارات المغادرة</h3>
            <p id="leaveModalText" style="color: var(--text-grey); font-size: 0.95rem; margin-bottom: 20px; padding: 0 20px;">اختار عايز تعمل إيه بالظبط؟</p>
            <div id="leaveModalButtons" style="display: flex; gap: 10px; justify-content: center; padding: 0 20px; flex-wrap: wrap;"></div>
        </div>
    </div>

    <script type="module" src="room.js"></script>
</body>
</html>
